<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1412"/>
      <stop offset="100%" style="stop-color:#080b0a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e87a"/>
      <stop offset="100%" style="stop-color:#00a855"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e87a;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00a855;stop-opacity:0.12"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e87a;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#00e87a;stop-opacity:0.25"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Faint grid -->
  <line x1="171" y1="80" x2="171" y2="432" stroke="#00e87a" stroke-width="1" stroke-opacity="0.07"/>
  <line x1="341" y1="80" x2="341" y2="432" stroke="#00e87a" stroke-width="1" stroke-opacity="0.07"/>
  <line x1="80" y1="171" x2="432" y2="171" stroke="#00e87a" stroke-width="1" stroke-opacity="0.07"/>
  <line x1="80" y1="341" x2="432" y2="341" stroke="#00e87a" stroke-width="1" stroke-opacity="0.07"/>

  <!-- Outer hexagon -->
  <polygon points="256,86 394,171 394,341 256,426 118,341 118,171"
    fill="none" stroke="#00e87a" stroke-width="1.5" stroke-opacity="0.13"/>

  <!-- Mid hexagon -->
  <polygon points="256,138 354,194 354,318 256,374 158,318 158,194"
    fill="none" stroke="#00e87a" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Diagonal fill slabs — asymmetric for interest -->
  <polygon points="118,341 256,341 118,256" fill="url(#g2)"/>
  <polygon points="394,171 256,171 394,256" fill="url(#g2)"/>

  <!-- Diamond outline -->
  <polygon points="256,146 366,256 256,366 146,256"
    fill="none" stroke="url(#g1)" stroke-width="2" stroke-opacity="0.35"/>

  <!-- Inner upward triangle — filled -->
  <polygon points="256,192 322,310 190,310" fill="url(#g3)" filter="url(#softglow)"/>

  <!-- Inner upward triangle — crisp stroke on top -->
  <polygon points="256,192 322,310 190,310"
    fill="none" stroke="url(#g1)" stroke-width="3" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Downward triangle overlay -->
  <polygon points="256,310 190,192 322,192"
    fill="none" stroke="#00e87a" stroke-width="1.5" stroke-linejoin="round" stroke-opacity="0.3"/>

  <!-- Glow centre -->
  <circle cx="256" cy="256" r="18" fill="#00e87a" fill-opacity="0.15" filter="url(#softglow)"/>
  <circle cx="256" cy="256" r="9"  fill="#00e87a" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="4"  fill="#ffffff" fill-opacity="0.95"/>

  <!-- Triangle vertex dots -->
  <circle cx="256" cy="192" r="4.5" fill="#00e87a" filter="url(#glow)"/>
  <circle cx="322" cy="310" r="4.5" fill="#00e87a" filter="url(#glow)"/>
  <circle cx="190" cy="310" r="4.5" fill="#00e87a" filter="url(#glow)"/>

  <!-- Corner tick marks -->
  <line x1="118" y1="171" x2="148" y2="171" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="118" y1="171" x2="118" y2="201" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="394" y1="171" x2="364" y2="171" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="394" y1="171" x2="394" y2="201" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="118" y1="341" x2="148" y2="341" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="118" y1="341" x2="118" y2="311" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="394" y1="341" x2="364" y2="341" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="394" y1="341" x2="394" y2="311" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
</svg>
